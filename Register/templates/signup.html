{% extends "layout/base.html" %}
{% block homeblock %}
{% load static %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Signup Card -->
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-success text-white text-center">
                    <h3 class="mb-0">📝 Signup Here!</h3>
                </div>

                <div class="card-body p-4" style="background:#f8f9fa;">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row">
                            <!-- Left Column -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" name="name" placeholder="Enter your name">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Mobile</label>
                                    <input type="text" class="form-control" name="mobile" placeholder="Enter mobile number">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="email" placeholder="Enter email">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" name="pwd" placeholder="Enter password">
                                </div>
                            </div>

                            <!-- Right Column -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" name="dob">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Gender</label><br>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" class="form-check-input" name="gender" value="Male">
                                        <label class="form-check-label">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" class="form-check-input" name="gender" value="Female">
                                        <label class="form-check-label">Female</label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Address</label>
                                    <textarea class="form-control" name="addr" rows="3" placeholder="Enter your address"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Role</label>
                                    <select class="form-select" name="role">
                                        <option value="EhrAdmin">EhrAdmin</option>
                                        <option value="Doctor">Doctor</option>
                                        <option value="Patient">Patient</option>
                                        <option value="Staff">Staff</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-success">Register</button>
                        </div>
                    </form>

                    <!-- Message Display -->
                    {% if MSG %}
                        <div class="alert alert-info mt-3 text-center">
                            {{MSG}}
                        </div>
                    {% endif %}
                </div>
            </div>

        </div>
    </div>
</div>




{% endblock %}
