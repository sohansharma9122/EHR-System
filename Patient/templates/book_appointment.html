{% extends "playout/base.html" %}
{% block patientblock %}
{% load static %}

<!-- Animate.css for transitions -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Form Card with slide-up animation -->
                <div class="card shadow-lg border-0 rounded-3 animate__animated animate__fadeInUp animate__slow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3 class="mb-0">Book Appointment</h3>
                    </div>

                    <div class="card-body p-4" style="background: #f8f9fa;">
                        <form method="post" action="{% url 'take_appointment' %}">
                            {% csrf_token %}

                            <!-- Doctor Info Section -->
                            <h5 class="text-primary mb-3">Doctor Details</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" name="dname" value="{{ddata.Name}}" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="demail" value="{{ddata.Email}}" readonly>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Contact</label>
                                    <input type="text" class="form-control" name="dmobile" value="{{ddata.Mobile}}" readonly>
                                </div>
                            </div>

                            <!-- Patient Info Section -->
                            <h5 class="text-primary mb-3">Patient Details</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" name="pname" value="{{pdata.Name}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="pemail" value="{{pdata.Email}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contact</label>
                                    <input type="text" class="form-control" name="pmobile" value="{{pdata.Mobile}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" name="pdob" value="{{pdata.DOB|date:'Y-m-d'}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select" name="pgender">
                                        <option value="{{pdata.Gender}}" selected>{{pdata.Gender}}</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label">Address</label>
                                    <input type="text" class="form-control" name="paddress" value="{{pdata.Address}}">
                                </div>
                                <div class="col-12 mb-4">
                                    <label class="form-label">Diseases</label>
                                    <textarea class="form-control" rows="3" name="diseases" placeholder="Describe your problem..."></textarea>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary px-5 py-2 shadow">
                                    Book Appointment
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
                <!-- End Form Card -->

            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
