<style>
.payment-failed-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    text-align: center;
    font-family: "Poppins", sans-serif;
    padding: 20px;
}

.failed-icon {
    font-size: 70px;
    color: #e63946;
    margin-bottom: 15px;
    animation: bounce 0.6s ease infinite alternate;
}

.payment-failed-container h2 {
    font-size: 28px;
    font-weight: 700;
    color: #e63946;
    margin-bottom: 10px;
}

.payment-failed-container p {
    font-size: 16px;
    color: #444;
    margin-bottom: 25px;
}

.retry-btn {
    background: linear-gradient(45deg, #f56565, #c53030);
    color: white !important;
    text-decoration: none;
    padding: 10px 24px;
    font-size: 16px;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.3s ease-in-out;
    box-shadow: 0 7px 18px rgba(229, 62, 62, 0.3);
}

.retry-btn:hover {
    background: linear-gradient(45deg, #c53030, #9b2c2c);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(229, 62, 62, 0.45);
}

@keyframes bounce {
    from { transform: translateY(0px); }
    to { transform: translateY(-6px); }
}
</style>


<div class="payment-failed-container">
    <div class="failed-icon">❌</div>
    
    <h2>Payment Failed</h2>
    <p>Sorry! Something went wrong during payment.<br>Please try again.</p>

    <a href="{% url 'viewlabtest' %}" class="retry-btn">🔁 Try Again</a>
</div>
