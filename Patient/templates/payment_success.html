{% if report %}

<style>
.page-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #e8f5e9, #ffffff);
    font-family: "Poppins", sans-serif;
    text-align: center;
}

.success-icon {
    font-size: 70px;
    color: #16a34a;
    margin-bottom: 10px;
}

.success-title {
    font-size: 32px;
    font-weight: 700;
    color: #065f46;
}

.success-msg {
    font-size: 16px;
    color: #047857;
    margin-bottom: 25px;
}

.download-btn {
    background: linear-gradient(45deg, #10b981, #059669);
    color: #fff;
    font-weight: 600;
    padding: 14px 26px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    box-shadow: 0 6px 14px rgba(0, 128, 0, 0.25);
    transition: 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
}

.download-btn:hover {
    background: linear-gradient(45deg, #059669, #047857);
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(0, 128, 0, 0.35);
}
</style>

<div class="page-wrapper">

    <div class="success-icon">✅</div>

    <h2 class="success-title">Payment Successful</h2>
    <p class="success-msg">Your lab report is now ready to download.</p>

    <a href="{% url 'download_report_pdf' report.report_id %}" class="download-btn">
        📄 Download Report PDF
    </a>

</div>

{% endif %}
