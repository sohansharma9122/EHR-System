{% extends "playout/base.html" %}
{% block patientblock %}
{% load static %}

<!-- Animate.css for transitions -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
    <div class="card shadow-lg mx-auto animate__animated animate__fadeInUp" style="max-width: 600px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">Welcome {{ user.Name }}, Select Your Tests</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="list-group mb-3">
                    {% for data in testdata %}
                    <label class="list-group-item d-flex justify-content-between align-items-center list-group-item-action">
                        {{ data.test_name }} - ₹{{ data.test_Price }}
                        <input class="form-check-input ms-2" type="checkbox" name="selected_tests" value="{{ data.test_id }}">
                    </label>
                    {% endfor %}
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
