{% extends "playout/base.html" %}
{% block patientblock %}
{% load static %}

<!-- Animate.css for smooth transitions -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-10">

                <!-- Form Card -->
                <div class="card shadow-lg border-0 rounded-4 animate__animated animate__fadeInUp animate__slow">
                    <div class="card-header text-white text-center" style="background: linear-gradient(90deg, #ff416c, #ff4b2b);">
                        <h3 class="mb-0">Update Profile</h3>
                    </div>

                    <div class="card-body p-4" style="background-color: #fdf6fb;">
                        <form method="post" enctype="multipart/form-data" action="{% url 'patientprofile' %}">
                            {% csrf_token %}
                            <div class="row">
                                <!-- Left Column -->
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Name</label>
                                        <input type="text" class="form-control border-primary" name="name" value="{{pdata.Name}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Email</label>
                                        <input type="email" class="form-control border-primary" name="email" value="{{pdata.Email}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Mobile</label>
                                        <input type="text" class="form-control border-primary" name="mobile" value="{{pdata.Mobile}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Password</label>
                                        <input type="password" class="form-control border-primary" name="pwd" value="{{pdata.Password}}">
                                    </div>
                                </div>

                                <!-- Right Column -->
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Address</label>
                                        <input type="text" class="form-control border-primary" name="ads" value="{{pdata.Address}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Date of Birth</label>
                                        <input type="date" class="form-control border-primary" name="dob" value="{{pdata.DOB|date:'Y-m-d'}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Gender</label>
                                        <input type="text" class="form-control border-primary" name="gender" value="{{pdata.Gender}}">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Image</label>
                                        <input type="file" class="form-control border-primary" name="image">
                                    </div>
                                </div>
                            </div>

                            <!-- Full width fields -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Document</label>
                                <input type="file" class="form-control border-primary" name="uploaded_doc">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Diseases</label>
                                <textarea class="form-control border-primary" name="disease" rows="3" placeholder="Describe your problem..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-gradient w-100 fw-bold py-2" 
                                    style="background: linear-gradient(90deg, #ff416c, #ff4b2b); color:white; font-size: 1.1rem;">
                                Update
                            </button>
                        </form>
                    </div>
                </div>
                <!-- End Form Card -->

            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
